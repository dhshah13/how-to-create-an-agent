# OpenShell policy for the live demo (verified against openshell 0.0.57).
#
# Network rules are PER-BINARY: python may talk to Vertex AI (and only Vertex AI),
# git may talk to GitHub (and only GitHub). Everything else - curl, pip, any tool
# the agent might shell out to - has zero egress.
#
# NOTE: the python path is the uv-managed interpreter the default sandbox image
# ships. If the image updates, re-resolve it inside the sandbox with:
#   readlink -f $(which python3)
#
# Apply to a running sandbox (network rules hot-reload):
#   openshell policy set agent-demo --policy sandbox-policy.yaml

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai-python-only
    endpoints:
      - host: aiplatform.googleapis.com       # "global" endpoint; regional would be
        port: 443                              # <region>-aiplatform.googleapis.com
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: oauth2.googleapis.com            # token refresh (host-side mint_token.py
        port: 443                              # makes this optional; kept for safety)
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - { path: /sandbox/.uv/python/cpython-3.14.3-linux-aarch64-gnu/bin/python3.14 }

  github_git:
    name: github-git-only
    endpoints:
      # git smart-HTTP POSTs even for fetch/clone, so this must be read-write.
      # Pushing is still impossible: no GitHub credentials exist in the sandbox.
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - { path: /usr/bin/git }
